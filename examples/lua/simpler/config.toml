# Simple nklhd configuration example
# This TOML file configures the FUSE mount and points to the Lua script

# Mount point for the FUSE filesystem
mountpoint = "/tmp/nklhd-simple"

# Lua script that defines routes (relative to this config file directory)
rootscript = "main.lua"

# Enable verbose debug logging
verbose = false

# Optional: maximum concurrent handlers
# max_handlers = 4